<!--
  GHL Custom HTML form — Staff provisioning
  Before pasting, replace only API_BASE and FORM_KEY below.
-->
<div id="mdn-staff-form">
  <style>
    #mdn-staff-form{--bg:#0c1322;--panel:#121c30;--line:#2b3953;--text:#f8fafc;--muted:#9aa8bd;--brand:#38bdf8;--brand2:#2563eb;max-width:860px;margin:24px auto;color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #mdn-staff-form *{box-sizing:border-box}
    #mdn-staff-form .mdn-card{background:linear-gradient(145deg,var(--panel),#0f1729);border:1px solid var(--line);border-radius:24px;padding:clamp(22px,5vw,48px);box-shadow:0 24px 70px rgba(0,0,0,.28)}
    #mdn-staff-form .mdn-kicker{color:var(--brand);font-size:12px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;margin:0 0 10px}
    #mdn-staff-form h2{font-size:clamp(28px,5vw,46px);line-height:1.08;margin:0 0 12px}
    #mdn-staff-form .mdn-intro{color:var(--muted);font-size:16px;line-height:1.65;margin:0 0 30px}
    #mdn-staff-form .mdn-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    #mdn-staff-form .mdn-wide{grid-column:1/-1}
    #mdn-staff-form label{display:block;font-size:13px;font-weight:750;margin:0 0 7px}
    #mdn-staff-form input,#mdn-staff-form select{width:100%;height:50px;border:1px solid var(--line);border-radius:12px;background:#0b1425;color:var(--text);padding:0 14px;font:inherit;outline:none}
    #mdn-staff-form input:focus,#mdn-staff-form select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
    #mdn-staff-form .mdn-help{display:block;color:var(--muted);font-size:12px;line-height:1.5;margin-top:7px}
    #mdn-staff-form .mdn-counties{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;max-height:280px;overflow:auto;padding:12px;background:#0b1425;border:1px solid var(--line);border-radius:14px}
    #mdn-staff-form .mdn-check{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid transparent;border-radius:10px;color:#dbe7f5;cursor:pointer;margin:0}
    #mdn-staff-form .mdn-check:hover{background:#15233b;border-color:var(--line)}
    #mdn-staff-form .mdn-check input{width:18px;height:18px;flex:none;accent-color:var(--brand2)}
    #mdn-staff-form .mdn-actions{display:flex;align-items:center;gap:14px;margin-top:25px}
    #mdn-staff-form button{min-height:52px;border:0;border-radius:13px;padding:0 22px;background:linear-gradient(135deg,var(--brand2),var(--brand));color:white;font:inherit;font-weight:850;cursor:pointer}
    #mdn-staff-form button:disabled{cursor:wait;opacity:.55}
    #mdn-staff-form .mdn-status{font-size:14px;color:var(--muted);line-height:1.45}
    #mdn-staff-form .mdn-status.err{color:#fda4af}
    #mdn-staff-form .mdn-success{padding:22px;border:1px solid rgba(74,222,128,.38);border-radius:16px;background:rgba(34,197,94,.09);line-height:1.6}
    #mdn-staff-form .mdn-hidden{display:none!important}
    @media(max-width:680px){#mdn-staff-form .mdn-grid{grid-template-columns:1fr}#mdn-staff-form .mdn-wide{grid-column:auto}#mdn-staff-form .mdn-counties{grid-template-columns:1fr}#mdn-staff-form .mdn-actions{align-items:stretch;flex-direction:column}#mdn-staff-form button{width:100%}}
  </style>

  <div class="mdn-card">
    <div id="mdn-form-view">
      <p class="mdn-kicker">Partner Staff Access</p>
      <h2>Create your staff account</h2>
      <p class="mdn-intro">Select your coverage area. Only counties connected to an active subaccount are available.</p>
      <form id="mdn-form" novalidate>
        <div class="mdn-grid">
          <div><label for="mdn-first">First name *</label><input id="mdn-first" autocomplete="given-name" required></div>
          <div><label for="mdn-last">Last name *</label><input id="mdn-last" autocomplete="family-name" required></div>
          <div><label for="mdn-email">Email *</label><input id="mdn-email" type="email" autocomplete="email" required></div>
          <div><label for="mdn-phone">Phone *</label><input id="mdn-phone" type="tel" autocomplete="tel" placeholder="+1 787 555 1212" required></div>
          <div class="mdn-wide"><label for="mdn-company">Business name</label><input id="mdn-company" autocomplete="organization"></div>
          <div>
            <label for="mdn-password">Password *</label>
            <input id="mdn-password" type="password" autocomplete="new-password" minlength="12" required>
            <span class="mdn-help">12+ characters with uppercase, lowercase, number and symbol.</span>
          </div>
          <div><label for="mdn-confirm">Confirm password *</label><input id="mdn-confirm" type="password" autocomplete="new-password" minlength="12" required></div>
          <div class="mdn-wide"><label for="mdn-state">State *</label><select id="mdn-state" required><option value="">Loading states…</option></select></div>
          <div id="mdn-county-wrap" class="mdn-wide mdn-hidden">
            <label>Counties *</label>
            <div id="mdn-counties" class="mdn-counties"></div>
            <span id="mdn-count" class="mdn-help">Select at least one county.</span>
          </div>
        </div>
        <div class="mdn-actions">
          <button id="mdn-submit" type="submit">Create staff account</button>
          <span id="mdn-status" class="mdn-status" aria-live="polite"></span>
        </div>
      </form>
    </div>
    <div id="mdn-success" class="mdn-success mdn-hidden" aria-live="polite"></div>
  </div>

  <script>
  (function(){
    "use strict";
    /* REQUIRED: replace these two values after deployment. */
    var API_BASE = "https://YOUR-CONTROL-TOWER-DOMAIN";
    var FORM_KEY = "848e57527017c5dac9f142dec3bfb6f6c51a7c31ab42c477";

    var states = [];
    var stateEl = document.getElementById("mdn-state");
    var countiesEl = document.getElementById("mdn-counties");
    var countyWrap = document.getElementById("mdn-county-wrap");
    var countEl = document.getElementById("mdn-count");
    var statusEl = document.getElementById("mdn-status");
    var submitEl = document.getElementById("mdn-submit");

    function escapeHtml(value){
      return String(value == null ? "" : value).replace(/[&<>\"']/g,function(ch){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[ch];});
    }
    function setStatus(message,isError){statusEl.textContent=message||"";statusEl.className="mdn-status"+(isError?" err":"");}
    function selectedCountyKeys(){return Array.prototype.slice.call(countiesEl.querySelectorAll("input:checked")).map(function(el){return el.value;});}
    function updateCount(){var total=selectedCountyKeys().length;countEl.textContent=total?total+" selected":"Select at least one county.";}
    function renderCounties(){
      var hit=states.filter(function(item){return item.state===stateEl.value;})[0];
      if(!hit){countyWrap.classList.add("mdn-hidden");countiesEl.innerHTML="";return;}
      countiesEl.innerHTML=hit.counties.map(function(item){return '<label class="mdn-check"><input type="checkbox" value="'+escapeHtml(item.key)+'"><span>'+escapeHtml(item.county)+'</span></label>';}).join("");
      countyWrap.classList.remove("mdn-hidden");
      countiesEl.addEventListener("change",updateCount,{once:true});
      Array.prototype.forEach.call(countiesEl.querySelectorAll("input"),function(el){el.addEventListener("change",updateCount);});
      updateCount();
    }
    fetch(API_BASE+"/api/public/staff-form/counties?formKey="+encodeURIComponent(FORM_KEY),{mode:"cors",cache:"no-store"})
      .then(function(res){return res.json().then(function(data){if(!res.ok)throw new Error(data.error||"Unable to load counties");return data;});})
      .then(function(data){
        states=Array.isArray(data.states)?data.states:[];
        stateEl.innerHTML='<option value="">Select your state</option>'+states.map(function(item){return '<option value="'+escapeHtml(item.state)+'">'+escapeHtml(item.state)+'</option>';}).join("");
        if(!states.length)setStatus("No counties with Location ID are currently available.",true);
      })
      .catch(function(error){stateEl.innerHTML='<option value="">Unable to load states</option>';setStatus(error.message,true);});
    stateEl.addEventListener("change",renderCounties);

    document.getElementById("mdn-form").addEventListener("submit",function(event){
      event.preventDefault();
      var form=event.currentTarget;
      var password=document.getElementById("mdn-password").value;
      var confirm=document.getElementById("mdn-confirm").value;
      var keys=selectedCountyKeys();
      if(!form.reportValidity())return;
      if(password!==confirm){setStatus("Passwords do not match.",true);return;}
      if(!keys.length){setStatus("Select at least one county.",true);return;}
      submitEl.disabled=true;
      setStatus("Creating staff access and updating calendars…",false);
      fetch(API_BASE+"/api/public/staff-form/applications",{
        method:"POST",mode:"cors",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          formKey:FORM_KEY,
          firstName:document.getElementById("mdn-first").value.trim(),
          lastName:document.getElementById("mdn-last").value.trim(),
          email:document.getElementById("mdn-email").value.trim(),
          phone:document.getElementById("mdn-phone").value.trim(),
          company:document.getElementById("mdn-company").value.trim(),
          password:password,
          countyKeys:keys
        })
      }).then(function(res){return res.json().then(function(data){if(!res.ok)throw new Error(data.error||"Unable to create staff account");return data;});})
        .then(function(data){
          document.getElementById("mdn-form-view").classList.add("mdn-hidden");
          var success=document.getElementById("mdn-success");
          success.classList.remove("mdn-hidden");
          success.innerHTML="<strong>Your staff account is ready.</strong><br>Application ID: "+escapeHtml(data.applicationId)+"<br>Calendar result: "+escapeHtml(data.status)+".";
        })
        .catch(function(error){submitEl.disabled=false;setStatus(error.message,true);});
    });
  })();
  </script>
</div>
